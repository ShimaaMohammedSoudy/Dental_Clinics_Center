   <div class="container">
    <div class="information">

            <div class="info">
                <h2>تسجيل <span class="colr">الدخول</span></h2>
                <form id="loginForm" method="POST">
                    <label for="email"><span>البريد الالكتروني</span></label>
                    <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
                    
                    <label for="tel"><span>رقم تليفون</span></label>
                    <input type="tel" id="tel" name="tel" placeholder="أدخل رقم تليفونك" required>
                    
                    <label for="password"><span>كلمة السر</span></label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة السر" required>
    
                    <label for="role"><span>اختر نوع الحساب</span></label>
                    <div class="role-selection">
                      <label>
                          <input type="radio" name="role" value="patient" required>
                          مريض
                      </label>
                      <label>
                          <input type="radio" name="role" value="doctor" required>
                          دكتور
                      </label>
                      <label>
                          <input type="radio" name="role" value="reception" required>
                          موظف استقبال
                      </label>
                    
                  </div>
                  <button class="btn"> تسجيل الدخول</button>
                </form>
            </div>
<div class="log">
<img src="../images/logo/1.png" alt="">
<h2>بريق</h2>
</div>
