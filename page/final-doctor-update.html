<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث بيانات طبيب</title>
    <link rel="stylesheet" href="/css/doctor-update.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            direction: rtl;
            text-align: right;
            margin: 10vh auto;
        }

        .btn-outline-primary {
            margin-right: 20px;
        }

        body {
            color: #00A1E0;
        }

        .btn-outline-primary:hover {
            background-color: #00A1E0;
        }
    </style>
</head>

<body id="body">
    
    <div id="container" class="container light-style flex-grow-1 container-p-y">
        <div id="card" class="card overflow-hidden">
            <div id="row" class="row no-gutters row-bordered row-border-light">
                <div id="sidebar" class="col-md-3 pt-0">
                    <div id="settings-links" class="list-group list-group-flush account-settings-links">
                        <a id="settings-general-link" class="list-group-item list-group-item-action active"
                            data-toggle="list" href="#account-general">تحديث بيانات الطبيب</a>
                    </div>
                </div>

                <div id="content" class="col-md-9">
                    <div id="tab-content" class="tab-content">
                        <!-- General Account Settings -->
                        <div id="account-general" class="tab-pane fade active show">
                            <div id="account-settings-media" class="card-body media align-items-center">
                                <img id="profile-image" src="../images/doctor-avatar.jpg" alt class="d-block ui-w-80">
                                <div id="media-body" class="media-body ml-4">
                                    <label id="update-profile-image" class="btn btn-outline-primary">
                                        تحديث صورة الملف الشخصي
                                        <input id="profile-image-input" type="file" class="account-settings-fileinput">
                                    </label>
                                    <button id="delete-image" type="button" class="btn btn-default md-btn-flat">حذف
                                        الصورة</button>
                                    <label id="upload-case-images" class="btn btn-outline-primary">
                                        رفع صور حالات
                                        <input id="case-images-input" type="file" multiple
                                            class="account-settings-fileinput">
                                    </label>
                                </div>
                            </div>
                            <hr id="divider" class="border-light m-0">
                            <div id="general-info" class="card-body">
                                <div id="doctor-name-group" class="form-group">
                                    <label id="doctor-name-label" class="form-label">اسم الدكتور</label>
                                    <input id="doctor-name-input" type="text" class="form-control mb-1"
                                        value="د. مصطفى الجندي">
                                </div>
                                <div id="specialization-group" class="form-group">
                                    <label id="specialization-label" class="form-label">التخصص</label>
                                    <input id="specialization-input" type="text" class="form-control"
                                        value="طب الأطفال">
                                </div>
                                <div id="work-days-group" class="form-group">
                                    <label id="work-days-label" class="form-label">أيام العمل</label>
                                    <input id="work-days-input" type="text" class="form-control mb-1"
                                        value="السبت والأربعاء">
                                </div>
                                <div id="experience-group" class="form-group">
                                    <label id="experience-label" class="form-label">الخبرة</label>
                                    <input id="experience-input" type="text" class="form-control" value="6 سنوات">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="action-buttons" class="text-right mt-3">
            <button id="save-button" type="button" class="btn btn-primary">حفظ</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-1.10.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Update Profile Image
        document.getElementById('profile-image-input').addEventListener('change', function () {
            const reader = new FileReader();
            reader.onload = function () {
                localStorage.setItem('doctorImage', reader.result);
                // Also update the profile image on the third page
                window.localStorage.setItem('doctorImage', reader.result);
            };
            reader.readAsDataURL(this.files[0]);
        });

        // Delete Profile Image
        document.getElementById('delete-image').addEventListener('click', function () {
            localStorage.setItem('doctorImage', 'https://example.com/default-avatar.png'); // Replace with the URL of the avatar
            // Also update the profile image on the third page
            window.localStorage.setItem('doctorImage', 'https://example.com/default-avatar.png');
        });

        // Upload Case Images
        document.getElementById('case-images-input').addEventListener('change', function () {
            const imagesArray = [];
            for (let i = 0; i < this.files.length; i++) {
                const reader = new FileReader();
                reader.onload = function () {
                    imagesArray.push(reader.result);
                    localStorage.setItem('caseImages', JSON.stringify(imagesArray));
                };
                reader.readAsDataURL(this.files[i]);
            }
        });

        // Save Button
        document.getElementById('save-button').addEventListener('click', function () {
            localStorage.setItem('doctorName', document.getElementById('doctor-name-input').value);
            localStorage.setItem('specialization', document.getElementById('specialization-input').value);
            localStorage.setItem('workDays', document.getElementById('work-days-input').value);
            localStorage.setItem('experience', document.getElementById('experience-input').value);
            alert('تم الحفظ بنجاح!');
        });
    </script>
</body>

</html>
